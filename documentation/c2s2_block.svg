<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470" font-family="Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="680" height="470" fill="#ffffff"/>
<style>.t{font-size:14px;font-weight:600}.s{font-size:12px}.h{font-size:15px;font-weight:600}</style>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="40" y="36" width="140" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
<text class="t" x="110" y="56" text-anchor="middle" fill="#2C2C2A">F1, F2</text>
<text class="s" x="110" y="73" text-anchor="middle" fill="#5F5E5A">(B,C,H,W) chacun</text>

<rect x="40" y="116" width="140" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text class="t" x="110" y="137" text-anchor="middle" fill="#0F6E56">Composites damier</text>
<text class="s" x="110" y="156" text-anchor="middle" fill="#085041">Xᵃ=M⊙F1+(1−M)⊙F2</text>
<line x1="110" y1="82" x2="110" y2="114" stroke="#5F5E5A" marker-end="url(#a)"/>

<rect x="40" y="208" width="140" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text class="t" x="110" y="229" text-anchor="middle" fill="#0F6E56">MCA-SF</text>
<text class="s" x="110" y="248" text-anchor="middle" fill="#085041">depthwise dilaté centre-coins</text>
<line x1="110" y1="174" x2="110" y2="206" stroke="#5F5E5A" marker-end="url(#a)"/>

<text class="h" x="270" y="112" fill="#2C2C2A">Cœur (par défaut)</text>
<rect x="270" y="122" width="190" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text class="t" x="365" y="143" text-anchor="middle" fill="#0F6E56">Interleave → S6 standard</text>
<text class="s" x="365" y="162" text-anchor="middle" fill="#085041">(B,C,H,2W) snake · mamba_ssm</text>
<path d="M180 237 L225 237 L225 151 L268 151" fill="none" stroke="#5F5E5A" marker-end="url(#a)"/>

<text class="h" x="270" y="220" fill="#2C2C2A">Variante d'ablation</text>
<rect x="270" y="230" width="190" height="58" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
<text class="t" x="365" y="251" text-anchor="middle" fill="#633806">Récurrence CSSM-L1</text>
<text class="s" x="365" y="270" text-anchor="middle" fill="#633806">‖B'z^post−Bz^pre‖₁ · kernel custom</text>
<path d="M180 237 L225 237 L225 259 L268 259" fill="none" stroke="#5F5E5A" stroke-dasharray="4 3" marker-end="url(#a)"/>

<rect x="510" y="176" width="130" height="58" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.6"/>
<text class="t" x="575" y="197" text-anchor="middle" fill="#2C2C2A">Fusion additive</text>
<text class="s" x="575" y="216" text-anchor="middle" fill="#5F5E5A">Z ∈ (B,C,H,W)</text>
<line x1="460" y1="151" x2="508" y2="192" stroke="#5F5E5A" marker-end="url(#a)"/>
<line x1="460" y1="259" x2="508" y2="218" stroke="#5F5E5A" stroke-dasharray="4 3" marker-end="url(#a)"/>

<rect x="40" y="316" width="600" height="68" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
<text class="t" x="60" y="340" fill="#633806">Pourquoi la fourche, pas la fusion</text>
<text class="s" x="60" y="361" fill="#633806">L1 exige des flux F1/F2 propres (pré→B, post→B'). Le damier permute les dates 1 case sur 2</text>
<text class="s" x="60" y="378" fill="#633806">→ les projections asymétriques B/B' reçoivent des dates inversées. On les fait concourir, pas se marier.</text>

<rect x="40" y="404" width="200" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text class="s" x="140" y="425" text-anchor="middle" fill="#085041">trait plein = cœur, sans risque</text>
<rect x="252" y="404" width="240" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.6"/>
<text class="s" x="372" y="425" text-anchor="middle" fill="#633806">pointillé = variante testée en ablation</text>
</svg>
